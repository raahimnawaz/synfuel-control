name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv venv --python 3.11

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Smoke-test the simulator
        run: uv run python -m sim.run_sim --no-show

      - name: Smoke-test the data-science pipeline
        run: |
          uv run python -m analysis.sample --n 32 --out analysis/data/doe.csv
          uv run python -m analysis.eda --no-show
          uv run python -m analysis.sensitivity --n 16 --no-show
          uv run python -m analysis.noise --no-show

      - name: Smoke-test the PINN surrogate (train + ONNX export)
        run: uv run python -m pinn.train --n 200 --epochs 300 --no-show
